 <svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">

  <!-- Hintergrund -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Spiralpfad (Struktur-Ebene 2.x–4.4) -->
  <path d="
    M450,450
    m-20,-20
    a20,20 0 1,1 40,0
    a40,40 0 1,1 -80,0
    a80,80 0 1,1 160,0
    a140,140 0 1,1 -280,0
    a220,220 0 1,1 440,0
  "
  fill="none" stroke="#333" stroke-width="3"/>

  <!-- Spiralpfad (Meta-Ebene 5.0) -->
  <path d="
    M450,450
    m-260,-260
    a260,260 0 1,1 520,0
  "
  fill="none" stroke="#0055ff" stroke-width="3" stroke-dasharray="10 8"/>

  <!-- Punkte für Versionen -->
  <circle cx="450" cy="430" r="8" fill="#000"/> <!-- 2.0 -->
  <circle cx="450" cy="390" r="8" fill="#000"/> <!-- 2.1 -->
  <circle cx="450" cy="330" r="8" fill="#000"/> <!-- 2.2 -->
  <circle cx="450" cy="250" r="10" fill="#000"/> <!-- 3.0 -->
  <circle cx="450" cy="150" r="10" fill="#000"/> <!-- 4.0 -->
  <circle cx="450" cy="80"  r="10" fill="#000"/> <!-- 4.1 -->
  <circle cx="450" cy="40"  r="10" fill="#000"/> <!-- 4.2 -->
  <circle cx="450" cy="20"  r="10" fill="#000"/> <!-- 4.3 -->
  <circle cx="450" cy="10"  r="12" fill="#000"/> <!-- 4.4 -->

  <!-- Meta-Ebene 5.0 -->
  <circle cx="450" cy="450" r="260" fill="none" stroke="#0055ff" stroke-width="3"/>

  <!-- Labels -->
  <text x="470" y="430" font-size="20" fill="#000">2.0</text>
  <text x="470" y="390" font-size="20" fill="#000">2.1</text>
  <text x="470" y="330" font-size="20" fill="#000">2.2</text>
  <text x="470" y="250" font-size="22" fill="#000">3.0</text>
  <text x="470" y="150" font-size="22" fill="#000">4.0</text>
  <text x="470" y="80"  font-size="22" fill="#000">4.1</text>
  <text x="470" y="40"  font-size="22" fill="#000">4.2</text>
  <text x="470" y="20"  font-size="22" fill="#000">4.3</text>
  <text x="470" y="10"  font-size="24" fill="#000">4.4</text>

  <text x="650" y="450" font-size="28" fill="#0055ff">5.0 – Meta‑Ebene</text>

  <!-- Titel -->
  <text x="450" y="870" font-size="32" fill="#000" text-anchor="middle">
    RRK‑Evolution – Rekursive Struktur- und Meta‑Rekursion
  </text>

</svg>
