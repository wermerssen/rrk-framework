<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">

  <defs>
    <style>
      .stroke { stroke:#ffffff; stroke-width:10; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin   { stroke:#ffffff; stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <!-- Halbkreis -->
  <path class="stroke"
        d="M 70 120 A 50 50 0 0 1 170 120" />

  <!-- Horizontale Linie -->
  <line x1="40" y1="120" x2="200" y2="120" class="stroke"/>

  <!-- Raute -->
  <path class="thin"
        d="M 120 105 L 135 120 L 120 135 L 105 120 Z" />

  <!-- Moderne, offene Pfeilspitze (größerer Abstand, klarer, eleganter) -->
  <line x1="185" y1="120" x2="160" y2="108" class="stroke"/>
  <line x1="185" y1="120" x2="160" y2="132" class="stroke"/>

</svg>
