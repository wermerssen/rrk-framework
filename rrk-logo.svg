<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">

  <!-- Hintergrund transparent -->
  <rect width="240" height="240" fill="none"/>

  <!-- Rekursive Quadrate (RRK-Ebenen) -->
  <g stroke="#1A1A1A" stroke-width="10" fill="none" stroke-linejoin="round">

    <!-- Ebene 1 -->
    <rect x="20" y="20" width="200" height="200" rx="12"/>

    <!-- Ebene 2 -->
    <rect x="55" y="55" width="130" height="130" rx="10"/>

    <!-- Ebene 3 -->
    <rect x="85" y="85" width="70" height="70" rx="8"/>

    <!-- Ebene 4 (Kern) -->
    <rect x="105" y="105" width="30" height="30" rx="6"/>
  </g>

</svg>
