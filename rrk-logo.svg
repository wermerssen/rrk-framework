<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">

  <!-- Hintergrund transparent -->
  <rect width="240" height="240" fill="none"/>

  <!-- Technisch-minimalistische Linienstruktur (Version von gestern) -->
  <g stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round">

    <!-- Diagonale Hauptlinie -->
    <line x1="40" y1="200" x2="200" y2="40"/>

    <!-- Parallele Linie 1 -->
    <line x1="60" y1="200" x2="200" y2="60"/>

    <!-- Parallele Linie 2 -->
    <line x1="40" y1="180" x2="180" y2="40"/>

    <!-- Vertikale Struktur links -->
    <line x1="40" y1="40" x2="40" y2="200"/>

    <!-- Vertikale Struktur rechts -->
    <line x1="200" y1="40" x2="200" y2="200"/>

  </g>

</svg>
