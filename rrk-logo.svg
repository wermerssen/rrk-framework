<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">
  <!-- Hintergrund transparent -->
  <defs>
    <style>
      .stroke { stroke:#ffffff; stroke-width:10; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .fill   { fill:#ffffff; }
    </style>
  </defs>

  <!-- Rahmen -->
  <rect x="20" y="20" width="200" height="200" class="stroke"/>

  <!-- diagonale Struktur (RRK-Dynamik) -->
  <path class="stroke"
        d="M60 190 L120 130 L180 70"/>

  <!-- parallele Linie dazu -->
  <path class="stroke"
        d="M60 160 L120 100 L180 40"/>

  <!-- Kernpunkt (RRK-Kern) -->
  <circle cx="120" cy="130" r="8" class="fill"/>

</svg>
