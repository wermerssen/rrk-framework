<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">

  <defs>
    <style>
      .stroke { stroke:#ffffff; stroke-width:10; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .fill   { fill:#ffffff; }
    </style>
  </defs>

  <!-- Halbkreis oben -->
  <path class="stroke"
        d="M 60 120
           A 60 60 0 0 1 180 120" />

  <!-- Horizontale Linie -->
  <line x1="40" y1="120" x2="200" y2="120" class="stroke"/>

  <!-- Raute in der Mitte -->
  <path class="stroke"
        d="M 120 100
           L 140 120
           L 120 140
           L 100 120
           Z" />

  <!-- Pfeil rechts (weiter innen, eleganter) -->
  <path class="stroke"
        d="M 170 120
           L 150 110
           M 170 120
           L 150 130" />

</svg>
