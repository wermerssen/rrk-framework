<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">

  <defs>
    <style>
      .stroke { stroke:#ffffff; stroke-width:10; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin   { stroke:#ffffff; stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .fill   { fill:#ffffff; }
    </style>
  </defs>

  <!-- Halbkreis oben (leicht nach vorne gezogen, moderner Radius) -->
  <path class="stroke"
        d="M 70 120
           A 50 50 0 0 1 170 120" />

  <!-- Horizontale Linie (leicht verlängert, optisch ruhiger) -->
  <line x1="40" y1="120" x2="200" y2="120" class="stroke"/>

  <!-- Raute (leicht gedreht, moderner, präziser) -->
  <path class="thin"
        d="M 120 105
           L 135 120
           L 120 135
           L 105 120
           Z" />

  <!-- Pfeil (modernere, längere, elegantere Spitze) -->
  <path class="stroke"
        d="M 175 120
           L 150 108
           M 175 120
           L 150 132" />

</svg>
