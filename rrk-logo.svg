<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="RRK Framework Logo">
  <!-- Hintergrund transparent -->
  <defs>
    <style>
      .stroke { stroke:#ffffff; stroke-width:10; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .fill   { fill:#ffffff; }
    </style>
  </defs>

  <!-- Dunkler Hintergrund (optional, für Website kannst du den entfernen) -->
  <rect x="0" y="0" width="240" height="240" fill="#0b1b3b"/>

  <!-- Kreis mit Öffnung rechts -->
  <path class="stroke"
        d="M 60 120
           A 60 60 0 1 1 180 120" />

  <!-- Horizontale Achse -->
  <line class="stroke" x1="40" y1="120" x2="200" y2="120" />

  <!-- Raute im Zentrum -->
  <polygon class="stroke"
           points="120,90 140,120 120,150 100,120" />

  <!-- Pfeilspitze rechts -->
  <path class="stroke"
        d="M 200 120 L 185 105 M 200 120 L 185 135" />
</svg>
