<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer loop -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="#1E4B9A" stroke-width="10"/>

  <!-- Four geometric states -->
  <!-- Stability (square) -->
  <rect x="82" y="20" width="16" height="16" fill="#1E4B9A"/>

  <!-- Transformation (triangle) -->
  <polygon points="150,90 135,110 165,110" fill="#1E4B9A"/>

  <!-- Drift (arrow) -->
  <polygon points="90,160 80,140 100,140" fill="#1E4B9A"/>

  <!-- System (circle) -->
  <circle cx="20" cy="90" r="10" fill="#1E4B9A"/>

  <!-- RRK monogram in the center -->
  <text x="50%" y="54%" text-anchor="middle" font-family="Arial" font-size="32" fill="#1E4B9A">
    RRK
  </text>
</svg>
